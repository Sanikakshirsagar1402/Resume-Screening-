services:
  - type: web
    name: resume-screening-ai
    env: node
    buildCommand: npm run install-all && npm run build && npm run render-postbuild
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        fromConfig: true
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_PATH
        value: python3
      - key: VITE_API_URL
        value: "" # Leave empty for relative path in single-service deployment
